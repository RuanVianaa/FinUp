<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: rgb(106, 153, 136);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }

    .caixa-login {
        color: rgb(89, 89, 89);
        font-size: 20px;
        background-color: #bcddc0;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        width: 300px;
        height: 400px;
        text-align: center;
    }

    .caixa-login input {
        width: 100%;
        padding: 10px;
        margin: 20px 0;
        border-radius: 10px;
        border: 1px solid #ccc;
        box-sizing: border-box;
    }

    .caixa-login button {
      width: 100%;
      padding: 10px;
      background-color: #4caf50;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
    }

    .button {
      display: inline-block;
      text-decoration: none;
      color: white;
      background-color: #4caf50;
      padding: 10px 20px;
      border-radius: 8px;
      margin-top: 10px;
    }

    .caixa-login button:hover {
      background-color: #45a049;
    }

    .Facebook, .Google {
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin-bottom: 10px;
        font-size: 15px;
    }

    header {
        position: absolute;
        top: 20px;
        align-items: center;
    }

    .finup-login {
        width: 200px;
        height: auto;
        display: relative;
        margin-bottom: 20px;
    }
  </style>
</head>
<body>
    <header>
    <img class="finup-login" src="Images/FinUp.png" alt="FinUp">
    </header>
  <div class="caixa-login">
    <h2>Acesse sua conta</h2>
    <button class="Facebook">Entre com o Facebook</button>
    <button class="Google">Entre com o Google</button>
    <hr>
    <label class="" for="text">Seu email</label>
    <input type="text">
    <input type="password">
    <a href="consultatransacoes.html" class="button">Entrar</a>
  </div>

</body>
</html>
