<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login FinUp</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #bcddc0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .logo {
      width: 200px;
      margin-bottom: 20px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .login-box {
      background-color: #fff;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 350px;
      margin: auto;
    }

    .login-box h2 {
      margin-bottom: 30px;
    }

    .btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background-color: #fff;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.2s ease;
    }

    .btn img {
      width: 20px;
      margin-right: 10px;
    }

    .btn:hover {
      background-color: #f0f0f0;
    }

    .or {
      text-align: center;
      margin: 20px 0;
      color: #888;
      font-size: 14px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .forgot {
      font-size: 13px;
      color: #666;
      margin-bottom: 15px;
      text-align: right;
      display: block;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background-color: #1db954;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      text-decoration: none;
      display: block;
      text-align: center;
    }

    .login-btn:hover {
      background-color: #169c45;
    }

    footer {
      background-color: #bcddc0;
      padding: 20px;
      text-align: center;
      color: #585858;
      font-size: 16px;
      width: 100%;
    }

    footer a {
      color: #1db954;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="Images/FinUp.png" alt="Logo" class="logo">

    <div class="login-box">
      <h2>Acesse sua conta</h2>

      <button class="btn">
        <img src="https://cdn-icons-png.flaticon.com/512/124/124010.png">
        Entrar com o Facebook
      </button>

      <button class="btn">
        <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png">
        Entrar com o Google
      </button>

      <div class="or">ou</div>

      <input type="email" placeholder="Seu email">
      <input type="password" placeholder="Sua senha">
      <a href="#" class="forgot">Esqueci minha senha</a>

      <a href="consultatransacoes.html" class="login-btn">Entrar</a>
    </div>
  </div>

  <footer>
    <p>Não possui uma conta? <a href="cadastro.html">Crie uma agora!</a></p>
  </footer>
  
</body>
</html>
